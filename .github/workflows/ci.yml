name: CI

on:
  pull_request:
    branches:
      - development
      - test
      - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run backend tests
        run: go test ./...

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

  playwright:
    name: Playwright local E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 curl

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Initialize CI database
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p backend/data
          rm -f backend/data/app-ci.db

          for migration in backend/migrations/*.up.sql; do
            echo "Applying $migration"
            sqlite3 backend/data/app-ci.db < "$migration"
          done

          sqlite3 backend/data/app-ci.db ".tables"

      - name: Start backend
        working-directory: backend
        shell: bash
        env:
          APP_ENV: ci
          PORT: "8080"
          DATABASE_PATH: data/app-ci.db

          JWT_SECRET: ci-secret-change-me
          JWT_ISSUER: call-it-cure-it-ci
          JWT_EXPIRATION_MINUTES: "480"

          DEV_SEED_ADMIN: "true"
          DEV_ADMIN_EMAIL: admin@example.com
          DEV_ADMIN_PASSWORD: admin123
          DEV_ADMIN_NAME: Admin User

          LLM_COACHING_ENABLED: "false"
          OPENAI_API_KEY: ""
          OPENAI_MODEL: gpt-5.1-mini
          OPENAI_BASE_URL: https://api.openai.com/v1
          OPENAI_TIMEOUT_SECONDS: "20"

          CORS_ALLOW_ORIGINS: http://localhost:5173
        run: |
          set -euo pipefail

          go run ./cmd/api > /tmp/callitcureit-backend.log 2>&1 &
          echo $! > /tmp/callitcureit-backend.pid

      - name: Wait for backend
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/v1/healthz >/dev/null; then
              echo "Backend is ready"
              exit 0
            fi

            echo "Waiting for backend..."
            sleep 2
          done

          echo "Backend failed to start"
          cat /tmp/callitcureit-backend.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        shell: bash
        env:
          VITE_API_BASE_URL: /api/v1
        run: |
          set -euo pipefail

          npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/callitcureit-frontend.log 2>&1 &
          echo $! > /tmp/callitcureit-frontend.pid

      - name: Wait for frontend
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..30}; do
            if curl -fsS http://localhost:5173 >/dev/null; then
              echo "Frontend is ready"
              exit 0
            fi

            echo "Waiting for frontend..."
            sleep 2
          done

          echo "Frontend failed to start"
          cat /tmp/callitcureit-frontend.log
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_SKIP_WEBSERVER: "true"
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: admin123
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-log
          path: /tmp/callitcureit-backend.log
          if-no-files-found: ignore

      - name: Upload frontend log
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-log
          path: /tmp/callitcureit-frontend.log
          if-no-files-found: ignore