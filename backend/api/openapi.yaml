openapi: 3.1.0

info:
  title: Call It Cure It API
  version: 0.1.0
  description: API for the legal objection training MVP.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: /api/v1
    description: Local or deployed API base path

security: []

tags:
  - name: System
    description: System health and operational endpoints.
  - name: Scenarios
    description: Training scenario catalog and transcript endpoints.
  - name: Sessions
    description: Training session playback, trainee actions, rulings, and evaluations.

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Check API health
      tags:
        - System
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          description: Invalid health check request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: API health check failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios:
    get:
      operationId: listScenarios
      summary: List published scenarios
      tags:
        - Scenarios
      responses:
        "200":
          description: Published training scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScenariosResponse"
        "400":
          description: Invalid scenario list request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to list scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios/{scenarioId}:
    get:
      operationId: getScenario
      summary: Get scenario detail
      tags:
        - Scenarios
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scenario detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScenarioResponse"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios/{scenarioId}/transcript:
    get:
      operationId: getScenarioTranscript
      summary: Get scenario transcript
      tags:
        - Scenarios
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scenario transcript lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScenarioTranscriptResponse"
        "404":
          description: Scenario transcript not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get scenario transcript
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions:
    post:
      operationId: createSession
      summary: Create training session
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"
        "400":
          description: Invalid session request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Scenario not found or has no lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to create session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Get training session
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to get session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/next:
    post:
      operationId: advanceSession
      summary: Advance session to next transcript line
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Next transcript line
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvanceSessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Session already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to advance session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/actions:
    post:
      operationId: submitTraineeAction
      summary: Submit and evaluate trainee action
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTraineeActionRequest"
      responses:
        "201":
          description: Trainee action submitted and evaluated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitTraineeActionResponse"
        "400":
          description: Invalid action or no current transcript line
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session or current line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Session already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to submit action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        detail:
          type:
            - string
            - "null"

    ListScenariosResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioSummary"

    GetScenarioResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ScenarioDetail"

    GetScenarioTranscriptResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioLine"

    ScenarioSummary:
      type: object
      required:
        - id
        - title
        - jurisdiction
        - practiceArea
        - hearingType
        - difficulty
        - status
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type:
            - string
            - "null"
        jurisdiction:
          type: string
        practiceArea:
          type: string
        hearingType:
          type: string
        difficulty:
          type: string
          enum:
            - beginner
            - intermediate
            - advanced
        status:
          type: string
          enum:
            - draft
            - published
            - archived

    ScenarioDetail:
      allOf:
        - $ref: "#/components/schemas/ScenarioSummary"
        - type: object
          required:
            - actors
          properties:
            actors:
              type: array
              items:
                $ref: "#/components/schemas/ScenarioActor"

    ScenarioActor:
      type: object
      required:
        - id
        - name
        - actorType
      properties:
        id:
          type: string
        name:
          type: string
        actorType:
          type: string
          enum:
            - judge
            - witness
            - opposing_counsel
            - trainee_counsel
        persona:
          type:
            - string
            - "null"

    ScenarioLine:
      type: object
      required:
        - id
        - scenarioId
        - sequenceNo
        - speakerType
        - lineText
        - lineKind
      properties:
        id:
          type: string
        scenarioId:
          type: string
        sequenceNo:
          type: integer
        speakerType:
          type: string
          enum:
            - judge
            - witness
            - opposing_counsel
            - trainee_counsel
            - coach
            - system
        speakerName:
          type:
            - string
            - "null"
        lineText:
          type: string
        lineKind:
          type: string
          enum:
            - question
            - answer
            - argument
            - ruling
            - instruction

    CreateSessionRequest:
      type: object
      required:
        - scenarioId
      properties:
        scenarioId:
          type: string
        mode:
          type: string
          enum:
            - spot_objection
            - respond_to_objection
            - full_simulation
          default: spot_objection

    GetSessionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/SessionDetail"

    AdvanceSessionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - session
            - completed
          properties:
            session:
              $ref: "#/components/schemas/SessionSummary"
            line:
              anyOf:
                - $ref: "#/components/schemas/ScenarioLine"
                - type: "null"
            completed:
              type: boolean

    SessionSummary:
      type: object
      required:
        - id
        - scenarioId
        - status
        - currentSequenceNo
        - mode
      properties:
        id:
          type: string
        scenarioId:
          type: string
        status:
          type: string
          enum:
            - active
            - completed
            - abandoned
        currentSequenceNo:
          type: integer
        mode:
          type: string
          enum:
            - spot_objection
            - respond_to_objection
            - full_simulation

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          required:
            - events
          properties:
            startedAt:
              type:
                - string
                - "null"
            completedAt:
              type:
                - string
                - "null"
            events:
              type: array
              items:
                $ref: "#/components/schemas/SessionEvent"

    SessionEvent:
      type: object
      required:
        - id
        - sessionId
        - sequenceNo
        - eventType
        - text
      properties:
        id:
          type: string
        sessionId:
          type: string
        sequenceNo:
          type: integer
        eventType:
          type: string
          enum:
            - system_line
            - trainee_objection
            - trainee_response
            - judge_ruling
            - coach_feedback
            - missed_opportunity
        actor:
          type:
            - string
            - "null"
        text:
          type: string
        createdAt:
          type:
            - string
            - "null"

    SubmitTraineeActionRequest:
      type: object
      required:
        - actionType
        - rawText
      properties:
        actionType:
          type: string
          enum:
            - object
            - respond
            - pass
        rawText:
          type: string

    SubmitTraineeActionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - session
            - action
            - traineeEvent
            - judgeEvent
            - coachEvent
            - evaluation
          properties:
            session:
              $ref: "#/components/schemas/SessionSummary"
            action:
              $ref: "#/components/schemas/TraineeAction"
            traineeEvent:
              $ref: "#/components/schemas/SessionEvent"
            judgeEvent:
              $ref: "#/components/schemas/SessionEvent"
            coachEvent:
              $ref: "#/components/schemas/SessionEvent"
            evaluation:
              $ref: "#/components/schemas/ActionEvaluation"

    TraineeAction:
      type: object
      required:
        - id
        - sessionId
        - actionType
        - rawText
      properties:
        id:
          type: string
        sessionId:
          type: string
        scenarioLineId:
          type:
            - string
            - "null"
        actionType:
          type: string
          enum:
            - object
            - respond
            - pass
        rawText:
          type: string
        normalizedObjectionTypeId:
          type:
            - string
            - "null"
        createdAt:
          type:
            - string
            - "null"

    ActionEvaluation:
      type: object
      required:
        - id
        - traineeActionId
        - valid
        - timely
        - ruling
        - legalAccuracyScore
        - phrasingScore
        - strategyScore
        - feedback
      properties:
        id:
          type: string
        traineeActionId:
          type: string
        matchedOpportunityId:
          type:
            - string
            - "null"
        normalizedObjectionTypeId:
          type:
            - string
            - "null"
        valid:
          type: boolean
        timely:
          type: boolean
        ruling:
          type: string
          enum:
            - sustained
            - overruled
            - no_ruling
        legalAccuracyScore:
          type: number
          minimum: 0
          maximum: 100
        phrasingScore:
          type: number
          minimum: 0
          maximum: 100
        strategyScore:
          type: number
          minimum: 0
          maximum: 100
        feedback:
          type: string
        createdAt:
          type:
            - string
            - "null"