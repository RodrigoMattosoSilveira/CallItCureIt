openapi: 3.1.0
info:
  title: Call It Cure It API
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/v1

paths:
  /healthz:
    get:
      operationId: getHealth
      tags:
        - System
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /scenarios:
    get:
      operationId: listScenarios
      tags:
        - Scenarios
      responses:
        "200":
          description: Published training scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScenariosResponse"

  /scenarios/{scenarioId}:
    get:
      operationId: getScenario
      tags:
        - Scenarios
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scenario detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScenarioResponse"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios/{scenarioId}/transcript:
    get:
      operationId: getScenarioTranscript
      tags:
        - Scenarios
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scenario transcript lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScenarioTranscriptResponse"
  /sessions:
    post:
      operationId: createSession
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionResponse"

  /sessions/{sessionId}/next:
    post:
      operationId: advanceSession
      tags:
        - Sessions
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Next transcript line
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvanceSessionResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    ListScenariosResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioSummary"

    GetScenarioResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ScenarioDetail"

    GetScenarioTranscriptResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioLine"

    ScenarioSummary:
      type: object
      required:
        - id
        - title
        - jurisdiction
        - practiceArea
        - hearingType
        - difficulty
        - status
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        jurisdiction:
          type: string
        practiceArea:
          type: string
        hearingType:
          type: string
        difficulty:
          type: string
          enum:
            - beginner
            - intermediate
            - advanced
        status:
          type: string
          enum:
            - draft
            - published
            - archived

    ScenarioDetail:
      allOf:
        - $ref: "#/components/schemas/ScenarioSummary"
        - type: object
          required:
            - actors
          properties:
            actors:
              type: array
              items:
                $ref: "#/components/schemas/ScenarioActor"

    ScenarioActor:
      type: object
      required:
        - id
        - name
        - actorType
      properties:
        id:
          type: string
        name:
          type: string
        actorType:
          type: string
          enum:
            - judge
            - witness
            - opposing_counsel
            - trainee_counsel
        persona:
          type: string
          nullable: true

    ScenarioLine:
      type: object
      required:
        - id
        - scenarioId
        - sequenceNo
        - speakerType
        - lineText
        - lineKind
      properties:
        id:
          type: string
        scenarioId:
          type: string
        sequenceNo:
          type: integer
        speakerType:
          type: string
          enum:
            - judge
            - witness
            - opposing_counsel
            - trainee_counsel
            - coach
            - system
        speakerName:
          type: string
          nullable: true
        lineText:
          type: string
        lineKind:
          type: string
          enum:
            - question
            - answer
            - argument
            - ruling
            - instruction
    CreateSessionRequest:
      type: object
      required:
        - scenarioId
      properties:
        scenarioId:
          type: string
        mode:
          type: string
          enum:
            - spot_objection
            - respond_to_objection
            - full_simulation
          default: spot_objection

    GetSessionResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/SessionDetail"

    AdvanceSessionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - session
            - completed
          properties:
            session:
              $ref: "#/components/schemas/SessionSummary"
            line:
              anyOf:
                - $ref: "#/components/schemas/ScenarioLine"
                - type: "null"
            completed:
              type: boolean

    SessionSummary:
      type: object
      required:
        - id
        - scenarioId
        - status
        - currentSequenceNo
        - mode
      properties:
        id:
          type: string
        scenarioId:
          type: string
        status:
          type: string
          enum:
            - active
            - completed
            - abandoned
        currentSequenceNo:
          type: integer
        mode:
          type: string
          enum:
            - spot_objection
            - respond_to_objection
            - full_simulation

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          required:
            - events
          properties:
            startedAt:
              type: string
            completedAt:
              anyOf:
                - type: string
                - type: "null"
            events:
              type: array
              items:
                $ref: "#/components/schemas/SessionEvent"

    SessionEvent:
      type: object
      required:
        - id
        - sessionId
        - sequenceNo
        - eventType
        - text
      properties:
        id:
          type: string
        sessionId:
          type: string
        sequenceNo:
          type: integer
        eventType:
          type: string
          enum:
            - system_line
            - trainee_objection
            - trainee_response
            - judge_ruling
            - coach_feedback
            - missed_opportunity
        actor:
          type: string
          nullable: true
        text:
          type: string
        createdAt:
          type: string