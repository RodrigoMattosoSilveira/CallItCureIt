services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: call-it-cure-it-backend-dev
    env_file:
      - .env
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_PATH: /app/data/app.db
      LLM_COACHING_ENABLED: ${LLM_COACHING_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "8080:8080"
    volumes:
      - backend-data-dev:/app/data
      - ./backend/migrations:/app/migrations:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: call-it-cure-it-frontend-dev
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data-dev: