services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: call-it-cure-it-backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      PORT: 8080
      DATABASE_PATH: /app/data/app.db
      JWT_SECRET: ${JWT_SECRET}
      LLM_COACHING_ENABLED: ${LLM_COACHING_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
    volumes:
      - backend-data:/app/data
      - ./backend/migrations:/app/migrations:ro
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: call-it-cure-it-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2.8
    container_name: call-it-cure-it-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  backend-data:
  caddy-data:
  caddy-config: